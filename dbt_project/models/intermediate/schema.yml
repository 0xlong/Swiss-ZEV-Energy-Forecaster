version: 2

models:
  - name: int_hourly_energy_balance
    description: >
      Per-asset per-hour energy balance: PV generation, building load, direct
      self-consumption, grid surplus, and grid deficit. Inner join drops the 5
      spring-forward hours missing from stg_load_hourly (< 0.01% of total kWh).
    columns:
      - name: asset_id
        tests: [not_null]
      - name: ts_utc
        tests: [not_null, unique]
      - name: ts_local
        tests: [not_null]
      - name: pv_power_kw
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 120
      - name: load_kw
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 300  # BDEW G1 peaks at ~239 kW for 500 MWh/yr scaling
      - name: direct_self_consumption_kw
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 120
      - name: surplus_kw
        tests: [not_null]
      - name: deficit_kw
        tests: [not_null]

  - name: int_price_features
    description: >
      Price feature table for ML (Phase D). Includes raw price, 1h/24h/168h lags,
      hour-of-day, day-of-week, weekend flag, and CH public holiday flag.
      Weather and generation-mix columns are added in Phase D.
    columns:
      - name: asset_id
        tests: [not_null]
      - name: ts_utc
        tests: [not_null, unique]
      - name: ts_local
        tests: [not_null]
      - name: price_eur_mwh
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: -500
                max_value: 4000

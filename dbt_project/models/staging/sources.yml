version: 2

sources:
  - name: raw
    schema: raw
    description: "Raw tables bulk-loaded from ingestion CSVs by load_to_duckdb.py."
    tables:
      - name: pvgis_hourly
        description: >
          Hourly simulated PV power output from PVGIS API (EU JRC, SARAH2 database).
          100 kWp rooftop installation at Baar warehouse (lat 47.195, lon 8.527).
          ts_local column contains UTC timestamps (named ts_local by PVGIS convention);
          stg_pvgis_hourly reinterprets them as UTC and derives Europe/Zurich ts_local.
        columns:
          - name: asset_id
          - name: ts_local
            description: "PVGIS UTC timestamp — misleadingly named; treated as UTC in staging."
          - name: pv_power_kw
          - name: irradiance_w_m2
          - name: sun_height_deg
          - name: temp_2m_c
          - name: wind_speed_m_s

      - name: load_hourly
        description: >
          Synthetic hourly building load from BDEW G1 standard load profile, scaled
          to 500 MWh/yr. Has 5 known DST duplicate ts_utc rows (spring-forward
          2015–2019) from nonexistent='shift_forward' in bwed_load_profile.py.
          stg_load_hourly deduplicates by averaging load_kw per (asset_id, ts_utc).
        columns:
          - name: asset_id
          - name: ts_utc
          - name: ts_local
          - name: load_kw

      - name: entsoe_prices
        description: >
          CH day-ahead spot prices from ENTSO-E Transparency Platform, bidding zone
          10YCH-SWISSGRIDZ. Period 2015-01-01 to 2019-12-31 (earliest CH data).
        columns:
          - name: asset_id
          - name: ts_utc
          - name: ts_local
          - name: price_eur_mwh
          - name: price_eur_kwh

      - name: openmeteo_hourly
        description: >
          Hourly weather data from Open-Meteo Archive API for the asset location
          (Baar, lat 47.195, lon 8.527). Variables: GHI (shortwave radiation),
          temperature, cloud cover, wind speed. Period 2015–2019.
        columns:
          - name: asset_id
          - name: ts_utc
          - name: ts_local
          - name: ghi_w_m2
          - name: temp_c
          - name: cloud_pct
          - name: wind_ms

      - name: entsoe_load_forecast
        description: >
          Day-ahead total load forecast for Switzerland from ENTSO-E (Swissgrid
          publication). Hourly MW values, 2015–2019.
        columns:
          - name: asset_id
          - name: ts_utc
          - name: ts_local
          - name: load_forecast_mw

      - name: entsoe_genmix
        description: >
          Actual generation per production type for Switzerland from ENTSO-E.
          Long format: one row per (asset_id, ts_utc, gen_type). Types include
          nuclear, hydro_*, solar, wind_onshore, fossil_gas. Period 2015–2019.
        columns:
          - name: asset_id
          - name: ts_utc
          - name: ts_local
          - name: gen_type
          - name: generation_mw

  - name: main
    schema: main
    description: >
      Tables written directly by Python ML scripts (ml/predict.py).
      These are read back into dbt so predictions appear in the lineage
      graph and can be tested.
    tables:
      - name: fct_forecasts
        description: >
          ML model predictions written by ml/predict.py via CREATE OR REPLACE
          TABLE. Schema: (asset_id, ts_utc, ts_local, target, y_pred, y_true,
          model_version). Only populated after running the ML pipeline.
        columns:
          - name: asset_id
          - name: ts_utc
          - name: ts_local
          - name: target
          - name: y_pred
          - name: y_true
          - name: model_version

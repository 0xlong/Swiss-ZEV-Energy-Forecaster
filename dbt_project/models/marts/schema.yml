version: 2

models:
  - name: fct_asset_performance
    description: >
      Per-asset per-hour operational facts with tariff and carbon constants from
      dim_asset. This is the primary fact table for KPI rollups and the dashboard.
    columns:
      - name: asset_id
        tests: [not_null]
      - name: ts_utc
        tests: [not_null, unique]
      - name: ts_local
        tests: [not_null]
      - name: pv_power_kw
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 120
      - name: load_kw
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 300  # BDEW G1 peaks at ~239 kW for 500 MWh/yr scaling
      - name: direct_self_consumption_kw
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 120

  - name: fct_hourly_market
    description: >
      ML feature table for the Phase D price forecasting model: price + lags +
      calendar + weather + load forecast + 24h-lagged gen-mix shares.
    columns:
      - name: asset_id
        tests: [not_null]
      - name: ts_utc
        tests: [not_null, unique]
      - name: ts_local
        tests: [not_null]
      - name: price_eur_mwh
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: -500
                max_value: 4000
      - name: ghi_w_m2
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1200
      - name: cloud_pct
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 100

  - name: fct_pv_features
    description: >
      ML feature table for the Phase D PV forecasting model: PV target +
      weather features + calendar + PV lags.
    columns:
      - name: asset_id
        tests: [not_null]
      - name: ts_utc
        tests: [not_null, unique]
      - name: ts_local
        tests: [not_null]
      - name: pv_power_kw
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 120
      - name: ghi_w_m2
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1200

  - name: mrt_zev_kpis_daily
    description: >
      Daily ZEV KPIs: self-consumption ratio, autarky ratio, CO2 avoided (kg),
      and CHF saved. Tariffs (0.28/0.08 CHF/kWh) and carbon intensity
      (~30 gCO2/kWh CH grid) are parameterized via dim_asset.
    columns:
      - name: asset_id
        tests: [not_null]
      - name: date
        tests: [not_null]
      - name: self_consumption_ratio
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
      - name: autarky_ratio
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1

  - name: mrt_zev_kpis_monthly
    description: >
      Monthly rollup of ZEV KPIs aggregated from mrt_zev_kpis_daily.
    columns:
      - name: asset_id
        tests: [not_null]
      - name: month
        tests: [not_null]
      - name: self_consumption_ratio
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
      - name: autarky_ratio
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1

  - name: fct_asset_performance_battery
    description: >
      Parallel fact table to fct_asset_performance extended with battery dispatch.
      Grain: (asset_id, ts_utc, battery_capacity_kwh). Five rows per hour, one per
      pre-computed battery capacity [0, 50, 100, 150, 200] kWh. Page 2 of the
      dashboard continues reading fct_asset_performance (unbatteried); Page 3 reads
      this table. Parallel tables preserve both grains without row multiplication.
    columns:
      - name: asset_id
        tests: [not_null]
      - name: ts_utc
        tests: [not_null]
      - name: battery_capacity_kwh
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 200
      - name: on_site_pv_kw
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 120
      - name: own_covered_load_kw
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 300

  - name: mrt_zev_kpis_battery_daily
    description: >
      Daily ZEV KPIs with battery. Grain: (asset_id, date, battery_capacity_kwh).
      Dashboard slider filters by battery_capacity_kwh; ratios and net_chf_cost
      are the key columns for financial comparison across battery sizes.
    columns:
      - name: asset_id
        tests: [not_null]
      - name: date
        tests: [not_null]
      - name: battery_capacity_kwh
        tests: [not_null]
      - name: self_consumption_ratio
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
      - name: autarky_ratio
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1

  - name: mrt_zev_kpis_battery_monthly
    description: >
      Monthly rollup of battery-aware ZEV KPIs. Grain: (asset_id, month,
      battery_capacity_kwh). Primary data source for the Streamlit Page 3 slider.
      Ratios are re-derived from monthly sums (volume-weighted), not averaged
      from daily ratios.
    columns:
      - name: asset_id
        tests: [not_null]
      - name: month
        tests: [not_null]
      - name: battery_capacity_kwh
        tests: [not_null]
      - name: self_consumption_ratio
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
      - name: autarky_ratio
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1

